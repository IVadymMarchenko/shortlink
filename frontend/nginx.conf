server {
    listen 80;
    server_name localhost;

    # 1. Раздача фронтенда (React статика)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. ПРОКСИ ДЛЯ БЭКЕНДА Django (Исправляет ошибку 405 Not Allowed)
    location /api/ {
        # 'backend' — это имя сервиса из docker-compose.yml
        proxy_pass http://backend:8000; 
        
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_redirect off;
    }

    # 3. Прокси для админки Django (чтобы работала по адресу localhost:5173/admin/)
    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Обработка ошибок
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}